name: Relatórios Trabalho Escravo (MTE)

on:
  schedule:
    # Primeiro dia do mês, 14h UTC
    - cron: "0 14 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run scraper
        run: python scripts/scrape_relatorios_te.py
      - name: Commit
        run: |
          if git diff --quiet -- relatorios-trabalho-escravo/data; then
            echo "No changes."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add relatorios-trabalho-escravo/data
          git commit -m "data(relatorios-te): atualiza snapshot"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 5))
          done
          exit 1
