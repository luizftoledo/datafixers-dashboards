name: Relatórios Trabalho Escravo (MTE)

on:
  schedule:
    # Toda primeira segunda-feira do mês (cron faz dia 1-7 que cair em segunda)
    # Simplificado: dia 1 do mês às 14h UTC
    - cron: "0 14 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install poppler-utils + tesseract (português)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-por

      - name: Scrape lista de relatórios
        run: python scripts/scrape_relatorios_te.py

      - name: Processa OCR + IA dos PDFs novos
        run: |
          # Cache automático via relatorios_ocr.json (só processa PDFs ainda não vistos)
          LIMIT=0 python scripts/processa_te_pdfs.py
        timeout-minutes: 120

      - name: Commit + push se mudou
        run: |
          if git diff --quiet -- relatorios-trabalho-escravo/data; then
            echo "Sem mudanças."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add relatorios-trabalho-escravo/data
          git commit -m "data(relatorios-te): atualiza snapshot + resumos IA"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 5))
          done
          exit 1

      - name: Notificar Telegram (se houver novos)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          python - <<'PY'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path
          # Conta quantos relatórios NOVOS apareceram desde o último run
          # Compara contagem atual vs prev (se não tem prev, manda mesmo assim)
          f = Path('relatorios-trabalho-escravo/data/relatorios_ocr.json')
          if not f.exists(): raise SystemExit(0)
          d = json.loads(f.read_text())
          total = len(d['relatorios'])
          # Manda resumo + 3 mais novos
          lines = [f"<b>🚨 Relatórios Trabalho Escravo · snapshot mensal</b>", "", f"Total: {total} relatórios no banco"]
          recentes = sorted([r for r in d['relatorios'] if r.get('ano')], key=lambda r:(-r['ano'], -(r.get('op_num') or 0)))[:5]
          if recentes:
              lines.append("")
              lines.append("<b>Mais recentes:</b>")
              for r in recentes:
                  dd = r.get('dados', {}) or {}
                  emp = (dd.get('empresa') or r['titulo'])[:60]
                  cnpj = dd.get('cnpj_cpf', '')
                  trab = dd.get('trabalhadores_resgatados') or 0
                  uf = dd.get('uf') or ''
                  lines.append(f"• <b>{emp}</b> {uf}")
                  if cnpj: lines.append(f"  <code>{cnpj}</code> · {trab} trab.")
          lines.append("")
          lines.append("→ <a href=\"https://dashboards.datafixers.org/relatorios-trabalho-escravo/\">dashboards.datafixers.org/relatorios-trabalho-escravo</a>")
          body = urllib.parse.urlencode({
              'chat_id': os.environ['TELEGRAM_CHAT_ID'],
              'text': '\n'.join(lines),
              'parse_mode': 'HTML',
              'disable_web_page_preview': 'true',
          }).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage", data=body, method='POST')
          with urllib.request.urlopen(req, timeout=30) as r: print('telegram:', r.status)
          PY
