name: Pesquisas eleitorais (TSE)

on:
  schedule:
    # Rodadas principais
    - cron: "0 12 * * *"
    - cron: "0 21 * * *"
    # Rodadas de backup (caso o TSE esteja fora numa rodada principal).
    # Idempotente: só commita se houver mudança e só alerta em pesquisa nova.
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scrape_pesquisas_tse.py

      - name: Install poppler (pdftotext)
        run: sudo apt-get install -y poppler-utils

      - name: Baixar questionários PesqEle
        continue-on-error: true
        run: python scripts/scrape_pesqele_questionarios.py --retry-erros --delay 0.8

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pesquisas/data/
          NOVAS=0
          if [ -f pesquisas/data/novas.json ]; then
            NOVAS=$(python -c 'import json; print(len(json.load(open("pesquisas/data/novas.json"))))')
          fi
          echo "novas=$NOVAS" >> "$GITHUB_OUTPUT"
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            if [ "$NOVAS" -gt 0 ]; then
              MSG="data(pesquisas): $NOVAS nova(s) pesquisa(s)"
            else
              MSG="chore(pesquisas): atualiza status"
            fi
            git commit -m "$MSG"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin HEAD:main; then break; fi
              sleep $((attempt * 5))
            done
          fi

      - name: Telegram alert
        if: steps.commit.outputs.novas != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          python - <<'PY'
          import json, os, urllib.parse, urllib.request
          from datetime import datetime
          from pathlib import Path
          novas = json.loads(Path("pesquisas/data/novas.json").read_text())
          if not novas: raise SystemExit(0)
          def fd(s):
              if not s: return "—"
              try: return datetime.fromisoformat(s).strftime("%d/%m")
              except Exception: return s[:10]
          lines = [f"<b>🗳️ {len(novas)} nova(s) pesquisa(s) nacional(is)</b>", ""]
          for p in novas[:20]:
              lines.append(f"• <b>{p.get('fantasia') or p.get('empresa') or '?'}</b> — {p.get('cargo')}\n  divulga {fd(p.get('divulgacao'))} · {p.get('entrevistados') or '?'} ent.\n  <code>{p.get('id')}</code>")
          if len(novas) > 20: lines.append(f"\n…e mais {len(novas)-20}.")
          lines.append("\n→ https://dashboards.datafixers.org/pesquisas/")
          body = urllib.parse.urlencode({"chat_id": os.environ["TELEGRAM_CHAT_ID"], "text": "\n".join(lines), "parse_mode": "HTML", "disable_web_page_preview": "true"}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage", data=body, method="POST")
          with urllib.request.urlopen(req, timeout=30) as r: print("telegram:", r.status)
          PY
