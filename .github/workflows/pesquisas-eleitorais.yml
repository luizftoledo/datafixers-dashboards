name: Pesquisas eleitorais (TSE)

on:
  schedule:
    # Rodadas principais
    - cron: "0 12 * * *"
    - cron: "0 21 * * *"
    # Rodadas de backup (caso o TSE esteja fora numa rodada principal).
    # Idempotente: só commita se houver mudança e só alerta em pesquisa nova.
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scrape_pesquisas_tse.py

      - name: Install poppler (pdftotext)
        # apt-get update primeiro: o indice de pacotes da imagem do runner fica
        # defasado e o install puro da 404 (ex: libpoppler134 9.8 sumiu do mirror)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: Baixar questionários PesqEle
        continue-on-error: true
        run: python scripts/scrape_pesqele_questionarios.py --retry-erros --delay 0.8

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pesquisas/data/
          NOVAS=0
          if [ -f pesquisas/data/novas.json ]; then
            NOVAS=$(python -c 'import json; print(len(json.load(open("pesquisas/data/novas.json"))))')
          fi
          echo "novas=$NOVAS" >> "$GITHUB_OUTPUT"
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            if [ "$NOVAS" -gt 0 ]; then
              MSG="data(pesquisas): $NOVAS nova(s) pesquisa(s)"
            else
              MSG="chore(pesquisas): atualiza status"
            fi
            git commit -m "$MSG"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin HEAD:main; then break; fi
              sleep $((attempt * 5))
            done
          fi

      # Alerta de Telegram removido a pedido do Luiz (28/06/26): os dados continuam
      # sendo atualizados/commitados, mas sem notificação por mensagem.
