name: Update Lulometro Dashboard Data

on:
  schedule:
    # 10:20 horario de Brasilia ~= 13:20 UTC
    - cron: "20 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node (pra wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 playwright pypdf pymupdf
          python -m playwright install chromium

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Build Lulometro data (Planalto + Biblioteca + Bluesky)
        run: |
          python scripts/build_lulometro_data.py --max-details 2500 --max-failures 3

      - name: Upsert to Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Aponta o script pra usar o wrangler.toml do worker
          ln -sf "$(pwd)/worker/wrangler.toml" wrangler.toml
          python scripts/upsert_lulometro_to_d1.py
