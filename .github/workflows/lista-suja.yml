name: Lista Suja MTE

on:
  schedule:
    # Toda segunda-feira 12:00 UTC (09h BRT)
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install poppler (pdftotext)
        run: sudo apt-get install -y poppler-utils

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scrape_lista_suja.py

      - name: Commit
        run: |
          if git diff --quiet -- lista-suja/data; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lista-suja/data
          git commit -m "data(lista-suja): atualiza snapshot"
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 5))
          done
          exit 1
