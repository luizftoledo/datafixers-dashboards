name: Update Cartao Corporativo Dashboard Data

on:
  schedule:
    # 09:00 horario de Brasilia ~= 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build cartao corporativo data
        run: |
          python scripts/build_cartao_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- cartao-corporativo/data/cpgf_agg.json; then
            echo "No cartao corporativo data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cartao-corporativo/data/cpgf_agg.json
          git commit -m "chore(cartao): atualiza dados CPGF"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Push failed after retries."
          exit 1
